<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>書籍管理システム</title>

    <!-- Axiosは、JavaScriptからAPIを呼び出すために使用します。 -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Bootstrapは、ボタン、Modal、Offcanvasなどの部品に使用します。 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Iconsは、メニューやボタンのアイコン表示に使用します。 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- この演習で用意した画面レイアウト用CSSです。 -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- 画面上部の共通ヘッダーです。どの疑似画面でも同じヘッダーを使います。 -->
    <header class="site-header">
        <a href="/" class="site-title"><i class="bi bi-book-half"></i> 書籍管理システム</a>
        <!-- モバイル幅の時だけ表示するメニューボタンです。BootstrapのOffcanvasを開きます。 -->
        <button class="btn btn-outline-light mobile-menu-button" type="button"
                data-bs-toggle="offcanvas" data-bs-target="#mobileMenu">
            <i class="bi bi-list"></i>
        </button>
    </header>

    <div class="layout">
        <!-- PC幅で表示するサイドバーです。リンクのクリックはapp.jsのNavigation APIで処理します。 -->
        <aside class="sidebar">
            <h2>メニュー</h2>
            <nav>
                <a href="/"><i class="bi bi-house-door"></i> トップページ</a>
                <a href="/books"><i class="bi bi-list-ul"></i> 書籍一覧</a>
                <a href="/books/new"><i class="bi bi-plus-circle"></i> 書籍登録</a>
            </nav>
        </aside>

        <!-- JavaScriptで作成した疑似画面は、このmain要素の中に表示します。 -->
        <main id="app" class="main-content"></main>
    </div>

    <!-- 更新Modal、削除Modalなど、JavaScriptで作成するModalの挿入場所です。 -->
    <div id="modal-area"></div>

    <!-- モバイル幅で表示するメニューです。三本線ボタンから開きます。 -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileMenu">
        <div class="offcanvas-header">
            <h2 class="offcanvas-title">メニュー</h2>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <nav class="mobile-menu-links">
                <a href="/"><i class="bi bi-house-door"></i> トップページ</a>
                <a href="/books"><i class="bi bi-list-ul"></i> 書籍一覧</a>
                <a href="/books/new"><i class="bi bi-plus-circle"></i> 書籍登録</a>
            </nav>
        </div>
    </div>

    <!-- 画面下部の共通フッターです。 -->
    <footer class="site-footer">
        <i class="bi bi-book-half"></i> 書籍管理システム
    </footer>

    <!-- BootstrapのJavaScriptです。ModalとOffcanvasを動かすために必要です。 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- type="module"にすると、import/exportを使ってJavaScriptファイルを分けられます。 -->
    <script type="module" src="/js/app.js"></script>
</body>
</html>
