<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>書籍管理システム</title>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="site-header">
        <a href="/" class="site-title"><i class="bi bi-book-half"></i> 書籍管理システム</a>
        <button class="btn btn-outline-light mobile-menu-button" type="button"
                data-bs-toggle="offcanvas" data-bs-target="#mobileMenu">
            <i class="bi bi-list"></i>
        </button>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <h2>メニュー</h2>
            <nav>
                <a href="/"><i class="bi bi-house-door"></i> トップページ</a>
                <a href="/books"><i class="bi bi-list-ul"></i> 書籍一覧</a>
                <a href="/books/new"><i class="bi bi-plus-circle"></i> 書籍登録</a>
            </nav>
        </aside>

        <main id="app" class="main-content"></main>
    </div>

    <div id="modal-area"></div>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileMenu">
        <div class="offcanvas-header">
            <h2 class="offcanvas-title">メニュー</h2>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <nav class="mobile-menu-links">
                <a href="/"><i class="bi bi-house-door"></i> トップページ</a>
                <a href="/books"><i class="bi bi-list-ul"></i> 書籍一覧</a>
                <a href="/books/new"><i class="bi bi-plus-circle"></i> 書籍登録</a>
            </nav>
        </div>
    </div>

    <footer class="site-footer">
        <i class="bi bi-book-half"></i> 書籍管理システム
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
